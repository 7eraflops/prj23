<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Device Setup</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem auto;
        max-width: 400px;
        padding: 0 1rem;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: bold;
      }
      input,
      select {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.5rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 2rem;
        width: 100%;
        padding: 0.75rem;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        border-radius: 4px;
      }
      button:hover {
        background: #0056b3;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .status {
        margin-top: 1rem;
        padding: 0.5rem;
        border-radius: 4px;
        display: none;
      }
      .error {
        background-color: #f8d7da;
        color: #721c24;
        display: block;
      }
      .success {
        background-color: #d4edda;
        color: #155724;
        display: block;
      }
      .info {
        background-color: #d1ecf1;
        color: #0c5460;
        display: block;
      }
    </style>
  </head>
  <body>
    <h2>Network & MQTT Setup</h2>

    <div id="statusMsg" class="status"></div>

    <form id="setupForm">
      <label for="ssid">Wi-Fi Network</label>
      <select id="ssid" name="ssid" required>
        <option value="">Scanning...</option>
      </select>

      <label for="password">Wi-Fi Password</label>
      <input type="password" id="password" name="password" />

      <label for="mqtt_uri">MQTT URI</label>
      <input
        type="text"
        id="mqtt_uri"
        name="mqtt_uri"
        placeholder="mqtt://192.168.1.100:1883"
        required
      />

      <label for="mqtt_user">MQTT User</label>
      <input type="text" id="mqtt_user" name="mqtt_user" />

      <label for="mqtt_pass">MQTT Password</label>
      <input type="password" id="mqtt_pass" name="mqtt_pass" />

      <button type="submit" id="submitBtn">Save & Reboot</button>
    </form>

    <!-- Import our TypeScript logic -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
