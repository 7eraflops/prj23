<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Device Setup</title>
    <link rel="stylesheet" href="/src/style.css" />
    <!-- CSS_PLACEHOLDER -->
  </head>
  <body>
    <div class="card">
      <nav id="nav" style="display: none;">
        <button class="tab-btn active" id="tabWifi">Wi-Fi</button>
        <button class="tab-btn" id="tabMqtt">MQTT</button>
        <button class="tab-btn" id="tabUpdate">Update</button>
      </nav>

      <div id="statusMsg" class="status"></div>

      <!-- STEP 1: WiFi Setup -->
      <div id="step1" class="step active">
        <h2 id="wifiTitle">Step 1: Wi-Fi Setup</h2>
        <form id="wifiForm">
          <label for="ssid">Wi-Fi Network</label>
          <select id="ssid" name="ssid" required>
            <option value="">Scanning...</option>
          </select>

          <label for="password">Wi-Fi Password</label>
          <input type="password" id="password" name="password" placeholder="Leave blank to keep current" />

          <button type="submit" id="wifiBtn">Connect to Wi-Fi</button>
        </form>
      </div>

      <!-- STEP 2: MQTT Setup -->
      <div id="step2" class="step">
        <h2 id="mqttTitle">Step 2: MQTT Setup</h2>
        <div id="discoveryList"></div>
        
        <form id="mqttForm">
          <label for="mqtt_type">MQTT Protocol</label>
          <select id="mqtt_type" name="mqtt_type">
            <option value="mqtt://">Standard (mqtt://)</option>
            <option value="ws://">Websocket (ws://)</option>
          </select>

          <label for="mqtt_host">Broker Address (IP or Hostname)</label>
          <input type="text" id="mqtt_host" name="mqtt_host" placeholder="192.168.1.100" required />

          <label for="mqtt_port">Port</label>
          <input type="number" id="mqtt_port" name="mqtt_port" value="1883" required />

          <label for="mqtt_user">User (Optional)</label>
          <input type="text" id="mqtt_user" name="mqtt_user" />

          <label for="mqtt_pass">Password (Optional)</label>
          <input type="password" id="mqtt_pass" name="mqtt_pass" placeholder="Leave blank to keep current" />

          <button type="submit" id="saveBtn">Save & Finish</button>
        </form>
      </div>

      <!-- STEP 3: Firmware Update -->
      <div id="step3" class="step">
        <h2 id="updateTitle">Firmware Update</h2>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 1.5rem;">
          Select a firmware binary (.bin) to upload to the device.
        </p>
        
        <form id="updateForm">
          <label for="otaFile">Firmware Binary</label>
          <input type="file" id="otaFile" name="otaFile" accept=".bin" required />

          <div id="otaProgressContainer" style="display: none; margin-top: 1.5rem;">
            <div style="width: 100%; background: #eee; border-radius: 4px; height: 10px; overflow: hidden;">
              <div id="otaProgressBar" style="width: 0%; background: #007bff; height: 100%; transition: width 0.2s;"></div>
            </div>
            <p id="otaStatusText" style="font-size: 0.8rem; text-align: center; margin-top: 0.5rem; color: #666;">0%</p>
          </div>

          <button type="submit" id="otaBtn">Upload & Update</button>
        </form>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
